<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Local Application</title>
    <link rel="stylesheet" href="/css/mainStyle.css">
    <link rel="stylesheet" href="/css/peopleStyle.css">
    <link rel="stylesheet" href="/css/personInfo.css">
    <link rel="stylesheet" href="/css/addLocalApplication.css">
    <!-- <script src="/Sections/LocalApplications/Add/addLocalApplication.js" defer></script> -->
    <script type="module" src="/js/addLocalApplication.js"></script>
    <script src="/js/main.js" defer></script>
    <script src="/js/layout.js" defer></script>

</head>
<body>
<div class="page">
  <!-- SIDEBAR -->

    <div id="sidebar"></div>


  <!-- MAIN CONTENT -->
  <main>
    <div class="title-bar">
      <h1>Add Local Application</h1>
    </div>

    <!-- ── Search Section ── -->
    <div class="search-section">
      <div class="search-field">
        <label for="personIdInput">Person ID</label>
        <input type="text" id="personIdInput" placeholder="e.g. 1080" autocomplete="off" />
      </div>
      <button class="btn-search" id="btnSearch">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
          <circle cx="8.5" cy="8.5" r="5.5"/>
          <line x1="13" y1="13" x2="17" y2="17"/>
        </svg>
        Search
      </button>
    </div>

    <!-- ── Person Info (hidden by default) ── -->
    <div class="personInfo hidden" id="personInfoCard">
      <div class="personID">
        <span>Person ID</span>
        <span class="id" id="infoId"></span>
      </div>
      <div class="personName">
        <span>Name</span>
        <span id="infoName"></span>
      </div>
      <div class="personNationalNo">
        <span>National No</span>
        <span id="infoNational"></span>
      </div>
      <div class="personGendor">
        <span>Gender</span>
        <span id="infoGender"></span>
      </div>
      <div class="personEmail">
        <span>Email</span>
        <span class="Email" id="infoEmail"></span>
      </div>
      <div class="personAddress">
        <span>Address</span>
        <span id="infoAddress"></span>
      </div>
      <div class="personDateOfBirth">
        <span>Date Of Birth</span>
        <span id="infoDOB"></span>
      </div>
      <div class="personCountry">
        <span>Country</span>
        <span id="infoCountry"></span>
      </div>
      <div class="personImage">
        <input type="image" src="" alt="Person Image" id="infoImage">
      </div>
    </div>

    <!-- ── Not Found (hidden by default) ── -->
    <div class="not-found hidden" id="notFoundMsg">
      <svg viewBox="0 0 48 48" width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="24" cy="24" r="20"/>
        <line x1="24" y1="16" x2="24" y2="26"/>
        <circle cx="24" cy="32" r="1.5" fill="currentColor"/>
      </svg>
      <p>No person found with this ID. Please try again.</p>
    </div>

    <!-- ── Add Local Application Form (hidden by default) ── -->
    <div class="addAppForm hidden" id="addAppForm">
      <div class="form-title">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="3" y="2" width="14" height="16" rx="2"/>
          <line x1="7" y1="7" x2="13" y2="7"/>
          <line x1="7" y1="10.5" x2="13" y2="10.5"/>
          <line x1="7" y1="14" x2="10" y2="14"/>
        </svg>
        New Local D.L. Application
      </div>

      <div class="form-grid">

        <!-- D.L. Application ID — readonly, auto-generated -->
        <div class="form-group">
          <label for="formAppId">D.L. Application ID</label>
          <div class="readonly-field" id="formAppId">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M10 2a4 4 0 0 1 4 4v1h1.5A1.5 1.5 0 0 1 17 8.5v9A1.5 1.5 0 0 1 15.5 19h-11A1.5 1.5 0 0 1 3 17.5v-9A1.5 1.5 0 0 1 4.5 7H6V6a4 4 0 0 1 4-4z"/>
              <circle cx="10" cy="13" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
            <span id="formAppIdValue">Auto-generated</span>
          </div>
        </div>

        <!-- Application Date — label (current date) -->
        <div class="form-group">
          <label>Application Date</label>
          <div class="readonly-field">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="4" width="14" height="13" rx="2"/>
              <line x1="3" y1="8" x2="17" y2="8"/>
              <line x1="7" y1="2" x2="7" y2="6"/>
              <line x1="13" y1="2" x2="13" y2="6"/>
            </svg>
            <span id="formAppDate"></span>
          </div>
        </div>

        <!-- License Class — dropdown from database -->
        <div class="form-group">
          <label for="formLicenseClass">License Class</label>
          <div class="select-wrapper">
            <select id="formLicenseClass">
              <option value="" disabled selected>Loading classes…</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 7.5l5 5 5-5"/>
            </svg>
          </div>
          <span class="error-msg hidden" id="licenseClassErr">Please select a license class.</span>
        </div>

        <!-- Application Fees — label (auto-filled based on class) -->
        <div class="form-group">
          <label>Application Fees</label>
          <div class="readonly-field fees-field">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="10" cy="10" r="8"/>
              <path d="M10 6v1.5M10 12.5V14"/>
              <path d="M7.5 8.5c0-1.1.9-1.5 2.5-1.5s2.5.6 2.5 1.5-1 1.3-2.5 1.5c-1.5.2-2.5.7-2.5 1.5S8.5 13 10 13s2.5-.4 2.5-1.5"/>
            </svg>
            <span id="formAppFees">—</span>
          </div>
        </div>

        <!-- Created By — label (from session/logged user) -->
        <div class="form-group form-group-full">
          <label>Created By</label>
          <div class="readonly-field">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="10" cy="6" r="3.5"/>
              <path d="M2.5 17c0-4.1 3.4-6.5 7.5-6.5s7.5 2.4 7.5 6.5"/>
            </svg>
            <span id="formCreatedBy">—</span>
          </div>
        </div>

      </div>

      <div class="form-actions">
        <button class="btn-cancel" id="btnCancel">Cancel</button>
        <button class="btn-submit" id="btnSubmit">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
            <polyline points="3 10 8 15 17 5"/>
          </svg>
          Submit Application
        </button>
      </div>
    </div>

  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
    <polyline points="3 10 8 15 17 5"/>
  </svg>
  <span id="toastMsg">Application submitted successfully!</span>
</div>

</body>
</html>
