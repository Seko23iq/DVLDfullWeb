<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/mainStyle.css" />
  <link rel="stylesheet" href="/css/peopleStyle.css" />
  <link rel="stylesheet" href="/css/personInfo.css">

  <!-- <script src="/js/mainPeople.js" defer></script> -->
  <script src="/js/personInfoScript.js" defer></script>
  <script src="/js/main.js" defer></script>
  <script src="/js/layout.js" defer></script>
  <title>Person Info</title>
</head>
<body>

<div class="page">

    <!-- ══════════════════════════════════════
            SIDEBAR
    ══════════════════════════════════════ -->
        <div id="sidebar"></div>

    <!-- ══════════════════════════════════════
            MAIN CONTENT
    ══════════════════════════════════════ -->
    <main>

    <!-- Title + Controls -->
    <div class="title-bar">
        <h1>Person Details</h1>
    </div>

    <div class="personInfo">
        <div class="personID">
            <span>Person ID: </span>
            <span class="id">1080</span>
        </div>
        <div class="personName">
            <span>Name: </span>
            <span class="Name">Ali Ahmed Omar</span>
        </div>
        <div class="personNationalNo">
            <span>National No: </span>
            <span class="NationalNo">N1080</span>
        </div>
        <div class="personGendor">
            <span>Gendor: </span>
            <span class="Gendor">Male</span>
        </div>
        <div class="personEmail">
            <span>Email: </span>
            <span class="Email">ali@gmail.com</span>
        </div>
        <div class="personAddress">
            <span>Address: </span>
            <span class="Address">Aqab, South St</span>
        </div>
        <div class="personDateOfBirth">
            <span>Date Of Birth: </span>
            <span class="DateOfBirth">11/12/1995</span>
        </div>
        <div class="personCountry">
            <span>Country: </span>
            <span class="Country">Iraq</span>
        </div>

        <div class="personImage">
            <input type="image" src="/Images/defaultImage.webp" alt="Person Image">
        </div>
    </div>

    </main>
</div>


<script>
</script>

</body>
</html>
