<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User</title>
    <link rel="stylesheet" href="/css/mainStyle.css">
    <link rel="stylesheet" href="/css/peopleStyle.css">
    <link rel="stylesheet" href="/css/personInfo.css">
    <link rel="stylesheet" href="/css/userAdd.css">

    <script type="module" src="/js/userAdd.js"></script>
    <script src="/js/main.js" defer></script>
  <script src="/js/layout.js" defer></script>

</head>
<body>
<div class="page">
  <!-- SIDEBAR -->
    <div id="sidebar"></div>


  <!-- MAIN CONTENT -->
  <main>
    <div class="title-bar">
      <h1>Add User</h1>
    </div>

    <!-- ── Search Section ── -->
    <div class="search-section">
      <div class="search-field">
        <label for="personIdInput">Person ID</label>
        <input type="text" id="personIdInput" placeholder="e.g. 1080" autocomplete="off" />
      </div>
      <button class="btn-search" id="btnSearch">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
          <circle cx="8.5" cy="8.5" r="5.5"/>
          <line x1="13" y1="13" x2="17" y2="17"/>
        </svg>
        Search
      </button>
    </div>

    <!-- ── Person Info (hidden by default) ── -->
    <div class="personInfo hidden" id="personInfoCard">
      <div class="personID">
        <span>Person ID</span>
        <span class="id" id="infoId"></span>
      </div>
      <div class="personName">
        <span>Name</span>
        <span id="infoName"></span>
      </div>
      <div class="personNationalNo">
        <span>National No</span>
        <span id="infoNational"></span>
      </div>
      <div class="personGendor">
        <span>Gender</span>
        <span id="infoGender"></span>
      </div>
      <div class="personEmail">
        <span>Email</span>
        <span class="Email" id="infoEmail"></span>
      </div>
      <div class="personAddress">
        <span>Address</span>
        <span id="infoAddress"></span>
      </div>
      <div class="personDateOfBirth">
        <span>Date Of Birth</span>
        <span id="infoDOB"></span>
      </div>
      <div class="personCountry">
        <span>Country</span>
        <span id="infoCountry"></span>
      </div>
      <div class="personImage">
        <input type="image" src="" alt="Person Image" id="infoImage">
      </div>
    </div>

    <!-- ── Not Found (hidden by default) ── -->
    <div class="not-found hidden" id="notFoundMsg">
      <svg viewBox="0 0 48 48" width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="24" cy="24" r="20"/>
        <line x1="24" y1="16" x2="24" y2="26"/>
        <circle cx="24" cy="32" r="1.5" fill="currentColor"/>
      </svg>
      <p>No person found with this ID. Please try again.</p>
    </div>

    <!-- ── Add User Form (hidden by default) ── -->
    <div class="addUserForm hidden" id="addUserForm">
      <div class="form-title">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="10" cy="6" r="3.5"/>
          <path d="M2.5 17c0-4.1 3.4-6.5 7.5-6.5s7.5 2.4 7.5 6.5"/>
          <line x1="14" y1="10" x2="18" y2="10"/>
          <line x1="16" y1="8" x2="16" y2="12"/>
        </svg>
        Create User Account
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="formPersonId">Person ID</label>
          <input type="text" id="formPersonId" readonly />
        </div>

        <div class="form-group">
          <label for="formUsername">Username</label>
          <input type="text" id="formUsername" placeholder="Enter username" autocomplete="off" />
          <span class="error-msg hidden" id="usernameErr">Username is required.</span>
        </div>

        <div class="form-group">
          <label for="formPassword">Password</label>
          <input type="password" id="formPassword" placeholder="Enter password" />
          <span class="error-msg hidden" id="passwordErr">Password must be at least 6 characters.</span>
        </div>

        <div class="form-group">
          <label for="formConfirm">Confirm Password</label>
          <input type="password" id="formConfirm" placeholder="Re-enter password" />
          <span class="error-msg hidden" id="confirmErr">Passwords do not match.</span>
        </div>

        <div class="form-group">
          <label for="formIsActive">Is Active</label>
          <select id="formIsActive">
            <option value="true">Active</option>
            <option value="false">Inactive</option>
          </select>
        </div>
      </div>

      

      <div class="form-actions">
        <button class="btn-cancel">Cancel</button>
        <button class="btn-submit">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
            <polyline points="3 10 8 15 17 5"/>
          </svg>
          Create User
        </button>
      </div>

      
    </div>
  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
    <polyline points="3 10 8 15 17 5"/>
  </svg>
  User created successfully!
</div>


</body>
</html>
