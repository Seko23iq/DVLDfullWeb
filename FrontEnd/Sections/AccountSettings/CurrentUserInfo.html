<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/mainStyle.css" />
  <link rel="stylesheet" href="/css/peopleStyle.css" />
  <link rel="stylesheet" href="/css/personInfo.css">
  <link rel="stylesheet" href="/css/userInfo.css">
  <script src="/js/currentUserInfo.js" defer></script>
  <script src="/js/main.js" defer></script>
  <script src="/js/layout.js" defer></script>
  <title>Manage Users</title>
</head>
<body>

<div class="page">

  <!-- ══════════════════════════════════════
        SIDEBAR
  ══════════════════════════════════════ -->
    <div id="sidebar"></div>
    

  <!-- ══════════════════════════════════════
        MAIN CONTENT
  ══════════════════════════════════════ -->
  <main>

    <!-- Title + Controls -->
    <div class="title-bar">
        <h1>User Details</h1>
    </div>

    <!-- ── Section 1: Person Details ──────────────────────────── -->
    <div class="section-label">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" width="15" height="15">
        <circle cx="10" cy="6" r="3.5"/>
        <path d="M2.5 17c0-4.1 3.4-6.5 7.5-6.5s7.5 2.4 7.5 6.5"/>
      </svg>
      Person Information
    </div>

    <div class="personInfo">
        <div class="personID">
            <span>Person ID</span>
            <span class="id">???</span>
        </div>
        <div class="personName">
            <span>Name</span>
            <span class="Name">???</span>
        </div>
        <div class="personNationalNo">
            <span>National No</span>
            <span class="NationalNo">???</span>
        </div>
        <div class="personGendor">
            <span>Gender</span>
            <span class="Gendor">???</span>
        </div>
        <div class="personEmail">
            <span>Email</span>
            <span class="Email">???</span>
        </div>
        <div class="personAddress">
            <span>Address</span>
            <span class="Address">???</span>
        </div>
        <div class="personDateOfBirth">
            <span>Date Of Birth</span>
            <span class="DateOfBirth">???</span>
        </div>
        <div class="personCountry">
            <span>Country</span>
            <span class="Country">???</span>
        </div>

        <div class="personImage">
            <input type="image" src="" alt="Person Image">
        </div>
    </div>

    <!-- ── Section 2: User Info ────────────────────────────────── -->
    <div class="section-label" style="margin-top: var(--sp-6);">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" width="15" height="15">
        <circle cx="6"  cy="10" r="2.5"/>
        <circle cx="14" cy="5"  r="2.5"/>
        <circle cx="14" cy="15" r="2.5"/>
        <line x1="8.2" y1="8.8"  x2="11.8" y2="6.2"/>
        <line x1="8.2" y1="11.2" x2="11.8" y2="13.8"/>
      </svg>
      User Information
    </div>

    <div class="userInfo">
        <div class="userID">
            <span>User ID</span>
            <span class="uid">???</span>
        </div>
        <div class="userName">
            <span>Username</span>
            <span class="uname">???</span>
        </div>
        <div class="userIsActive">
            <span>Status</span>
            <span class="isActive active-badge">???</span>
        </div>
    </div>

    </main>
</div>

<script>
window.addEventListener("load", () => {
    const userNameElement = document.getElementById("username");
    const storedName = localStorage.getItem("UserName");
    if (userNameElement) {
        userNameElement.textContent = storedName || "Guest";
    }
    loadUserInfo();
});
</script>

</body>
</html>
