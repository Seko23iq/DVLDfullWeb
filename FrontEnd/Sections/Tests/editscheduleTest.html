<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Test</title>
    <link rel="stylesheet" href="/css/scheduleTest.css">
    <link rel="stylesheet" href="/css/mainStyle.css">

    <script type="module" src="/js/editscheduleTest.js" ></script>
    <script src="/js/main.js" defer></script>
    <script src="/js/layout.js" defer></script>

</head>
<body>
<div class="page">

    <!-- Sidebar -->
    <div id="sidebar"></div>


    <!-- Main Content -->
    <main class="main-content">

        <div class="page-header">
            <h1>Schedule Test</h1>
            <p>Fill in the test scheduling details below</p>
        </div>

        <!-- Applicant Info Card -->
        <div class="card">
            <div class="card-title">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                    <circle cx="10" cy="6" r="3.5"/>
                    <path d="M2.5 17c0-4.1 3.4-6.5 7.5-6.5s7.5 2.4 7.5 6.5"/>
                </svg>
                Applicant Information
            </div>

        <div class="fields-grid">
            <div class="field">
                <label>D.L. App. ID</label>
                <div class="field-value empty" id="dlAppID">—</div>
            </div>

            <div class="field">
                <label>D. Class</label>
                <div class="field-value empty" id="dClass">—</div>
            </div>

            <div class="field">
                <label>Name</label>
                <div class="field-value empty" id="appName">—</div>
            </div>

            <div class="field">
                <label>Trial</label>
                <div class="field-value empty" id="appTrial">—</div>
            </div>

            <div class="field">
                <label>Date</label>
                <input type="date" id="testDate" />
            </div>

            <div class="field">
                <label>Fees</label>
                <div class="field-value empty" id="appFees">—</div>
            </div>
        </div>

        <!-- Retake Test Info Card (Disabled) -->
        <div class="retake-card">
            <div class="card-title">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                    <path d="M4 10a6 6 0 1 1 1.5 4"/>
                    <path d="M4 14v-4h4"/>
                </svg>
                Retake Test Info
            </div>

            <div class="fields-grid">

                <div class="field">
                    <label>R. App Fees</label>
                    <div class="field-value">—</div>
                </div>

                <div class="field">
                    <label>Total Fees</label>
                    <div class="field-value highlight">—</div>
                </div>

                <div class="field">
                    <label>R. Test. App. ID</label>
                    <div class="field-value">—</div>
                </div>

            </div>
        </div>

        <!-- Action Buttons -->
        <div class="actions">
            <button class="btn btn-ghost">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M4 10l5 5 7-8"/>
                </svg>
                Cancel
            </button>
            <button class="btn btn-primary">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
                    <rect x="3" y="4" width="14" height="13" rx="1.5"/>
                    <path d="M7 2v4M13 2v4M3 9h14"/>
                </svg>
                Schedule Test
            </button>
        </div>

    </main>
</div>


<!-- Toast -->
<div class="toast" id="toast">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
        <polyline points="3 10 8 15 17 5"/>
    </svg>
    <!-- User created successfully! -->
</div>
</body>
</html>
